<div class="shell">
  <header class="shell-header">
    <h1 class="brand">
      <app-icon name="ic_vcb" [size]="12" alt="VCB" />
      SK106
    </h1>
    <button type="button" class="logout-btn" (click)="logout()">Dang xuat</button>
  </header>

  <nav class="shell-nav" aria-label="Main menu">
    @for (item of menuItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <main class="shell-content">
    <router-outlet />
  </main>
</div>
